binary_sensor:
  # Status of device connected to Home-Assistant
  - platform: status
    name: Status
    entity_category: "diagnostic"

button:
  - platform: restart
    id: restart_button
    name: Restart
    entity_category: diagnostic

sensor:
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: WiFi Signal dB
    id: wifi_signal_db
    update_interval: 15s
    entity_category: "diagnostic"
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
      - throttle: 60s

  - platform: template # Reports the WiFi signal strength in %
    name: WiFi Signal Percent
    lambda: return min(max(2 * (id(wifi_signal_db).state + 100.0), 0.0), 100.0);
    update_interval: 15s
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
      - throttle: 60s
    unit_of_measurement: "%"
    icon: mdi:wifi
    state_class: "measurement"
    entity_category: "diagnostic"


  - platform: uptime
    name: Uptime Sensor
    entity_category: "diagnostic"
    unit_of_measurement: d
    update_interval: 600s
    accuracy_decimals: 1
    filters:
      - multiply: 0.000011574
      - throttle: 900s